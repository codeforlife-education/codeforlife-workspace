name: Backend

on:
  workflow_call:
    inputs:
      # Python
      python-version:
        description: "The Python version to set up."
        type: number
        required: false
        default: 3.12
      # PostgreSQL
      postgres-db:
        description: "The postgres database to test against."
        type: string
        required: false
        default: "db"
      postgres-version:
        description: "The postgres version to set up."
        type: number
        required: false
        default: 17
      # Django
      django:
        description: "Whether the Django web framework is used."
        type: boolean
        required: false
        default: true
    secrets: # All secrets should not be required to support contributors.
      CODECOV_TOKEN:
        description: "The token used to gain access to Codecov."
        required: false
      CFL_APP_PRIVATE_KEY:
        description: "The private key of CFL's GitHub App."
        required: false
      SNYK_TOKEN:
        description: "The token used to authenticate with Snyk API."
        required: false

jobs:
  issue:
    uses: codeforlife-education/codeforlife-workspace/.github/workflows/issues.yaml@main
    secrets: inherit

  contributor:
    uses: codeforlife-education/codeforlife-contributor-backend/.github/workflows/check-pr-authors-signed-latest-agreement.yaml@main
    permissions:
      id-token: write

  test:
    uses: codeforlife-education/codeforlife-workspace/.github/workflows/test-python-code.yaml@main
    secrets: inherit
    with:
      source-path: src
      python-version: ${{ inputs.python-version }}
      postgres-db: ${{ inputs.postgres-db }}
      postgres-version: ${{ inputs.postgres-version }}

  build:
    runs-on: ubuntu-22.04
    needs: [test]
    # Build if:
    #  - the repo's owner is Code for Life Education.
    #  - the repo is not the backend template.
    #  - a change is made to the default branch.
    if: |
      github.repository_owner_id == vars.CFL_EDU_ORG_ID &&
      github.repository_id != 610204172 &&
      github.ref_name == github.event.repository.default_branch
    steps:
      - name: 🐍 Set up Python ${{ inputs.python-version }} Environment
        uses: codeforlife-education/codeforlife-workspace/.github/actions/python/setup-environment@main
        with:
          python-version: ${{ inputs.python-version }}

      - name: 🏗️ Generate requirements.txt
        run: pipenv requirements > requirements.txt

      - name: 🏗️ Collect Static Files
        run: pipenv run python ./manage.py collectstatic --noinput --clear

      - name: 📤 Upload Build Artifact
        uses: codeforlife-education/codeforlife-workspace/.github/actions/service/upload-build-artifact@main
        with:
          path: |
            requirements.txt
            static/

  release:
    concurrency: release
    runs-on: ubuntu-22.04
    needs: [build]
    env:
      DEPLOY_ARTIFACT_PATH: ".deploy"
    steps:
      - name: 🤖 Set up CFL bot
        uses: codeforlife-education/codeforlife-workspace/.github/actions/bot/setup@main
        id: setup-bot
        with:
          cfl-app-private-key: ${{ secrets.CFL_APP_PRIVATE_KEY }}

      - name: 🛫 Set up Release
        uses: codeforlife-education/codeforlife-workspace/.github/actions/service/setup-release@main
        with:
          cfl-bot-gh-token: ${{ steps.setup-bot.outputs.token }}

      - name: 📥 Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build

      - name: 📁 Zip Static Files
        working-directory: static
        run: zip --quiet --recurse-paths ../static.zip .

      - name: 🚀 Publish Semantic Release
        uses: codeforlife-education/codeforlife-workspace/.github/actions/service/release@main
        with:
          cfl-bot-gh-token: ${{ steps.setup-bot.outputs.token }}
          rc-path: backend/.releaserc.json

  monitor:
    uses: codeforlife-education/codeforlife-workspace/.github/workflows/monitor-python-release.yaml@main
    secrets: inherit
    needs: [release]
    with:
      python-version: ${{ inputs.python-version }}

  submodule:
    uses: codeforlife-education/codeforlife-workspace/.github/workflows/gitmodules.yaml@main
    secrets: inherit
    needs: [release]
